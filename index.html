<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nura Manhwa App</title>
    <link rel="stylesheet" href="style.css"
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h2 style="text-align: center;">Nura Manhwa Reader 📚</h2>
    <div id="display-area">
        <p style="text-align: center; color: #888;">Memuat data...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const display = document.getElementById('display-area');

        try {
            // 1. Ambil data dari URL
            const params = new URLSearchParams(window.location.search);
            const rawData = params.get('data');

            if (!rawData) {
                display.innerHTML = '<p style="text-align:center;">Belum ada data. Coba ketik /update di bot.</p>';
            } else {
                // 2. Decode dan Parse data
                const decodedData = decodeURIComponent(rawData);
                const data = JSON.parse(decodedData);

                if (data.length === 0) {
                    display.innerHTML = '<p style="text-align:center;">Data kosong.</p>';
                } else {
                    display.innerHTML = ''; // Bersihkan tulisan memuat
                    data.forEach(item => {
                        const card = `
                            <div class="manga-card">
                                <img src="${item.img || 'https://via.placeholder.com/60x80?text=No+Img'}" onerror="this.src='https://via.placeholder.com/60x80?text=Error'">
                                <div>
                                    <div class="title">${item.judul}</div>
                                    <div style="font-size:11px; color:#aaa; margin: 5px 0;">${item.genre}</div>
                                    <a href="${item.link}" style="color:#0088cc; font-size:12px; text-decoration:none;">Buka Web →</a>
                                </div>
                            </div>
                        `;
                        display.innerHTML += card;
                    });
                }
            }
        } catch (e) {
            // Jika ada error, tampilkan pesan errornya di layar (tidak putih doang)
            display.innerHTML = `
                <div class="error-msg">
                    <strong>Waduh, ada masalah!</strong><br>
                    ${e.message}
                </div>
            `;
        }
    </script>
</body>
</html>
